services:
  # 数据库迁移服务 (一次性运行)
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-yyc3db}
      - DB_USER=${DB_USER:-yyc3user}
      - DB_PASSWORD=${DB_PASSWORD:-yyc3password}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yyc3-network
    restart: "no"

  # Next.js应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-yyc3db}
      - DB_USER=${DB_USER:-yyc3user}
      - DB_PASSWORD=${DB_PASSWORD:-yyc3password}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - yyc3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - yyc3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL数据库服务
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-yyc3user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-yyc3password}
      - POSTGRES_DB=${DB_NAME:-yyc3db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - yyc3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yyc3user}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - yyc3-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  yyc3-network:
    driver: bridge

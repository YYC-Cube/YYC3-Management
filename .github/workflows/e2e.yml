name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build once (warm cache)
        run: bun run build
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: Start dev server (background)
        run: |
          bun run dev > /tmp/next-dev.log 2>&1 &
          echo "PID=$!"
          sleep 5

      - name: Wait for server (up to 120s)
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3223 2>/dev/null | grep -q 200; then
              echo "Server ready after ${i}0s"
              exit 0
            fi
            echo "Waiting... (${i}0s)"
            sleep 10
          done
          echo "Server failed to start. Logs:"
          tail -50 /tmp/next-dev.log
          exit 1

      - name: Run E2E tests
        run: bun run test:e2e:ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: tests/e2e-report/
          retention-days: 7

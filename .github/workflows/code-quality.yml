# =============================================================
# YYC³ 企业智能管理系统 — 代码质量检查流水线
# 独立运行，专注代码质量、复杂度、安全漏洞扫描
# =============================================================
name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.2'

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint
        continue-on-error: true

      - name: Run TypeScript type check
        run: bun run type-check
        continue-on-error: true

      - name: Check for TODO/FIXME comments
        continue-on-error: true
        run: |
          TODO_COUNT=$(grep -r "TODO\|FIXME\|HACK" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . \
            | grep -v node_modules | grep -v .next | grep -v core | wc -l)
          echo "Found $TODO_COUNT TODO/FIXME/HACK comments"
          if [ "$TODO_COUNT" -gt 50 ]; then
            echo "WARNING: Too many TODO comments ($TODO_COUNT). Please address them."
          fi

      - name: Check for console.log statements
        continue-on-error: true
        run: |
          CONSOLE_COUNT=$(grep -r "console\.log\|console\.debug" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . \
            | grep -v node_modules | grep -v ".next" | wc -l)
          echo "Found $CONSOLE_COUNT console.log/debug statements"
          if [ "$CONSOLE_COUNT" -gt 10 ]; then
            echo "WARNING: Too many console.log statements ($CONSOLE_COUNT). Consider removing them."
          fi

      - name: Check file sizes
        continue-on-error: true
        run: |
          LARGE_FILES=$(find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            -not -path "*/node_modules/*" -not -path "*/.next/*" -not -path "*/core/*" | while read file; do
            SIZE=$(stat -c%s "$file" 2>/dev/null)
            if [ -n "$SIZE" ] && [ "$SIZE" -gt 51200 ]; then
              echo "$file: $SIZE bytes"
            fi
          done)
          if [ -n "$LARGE_FILES" ]; then
            echo "Large files found (>50KB):"
            echo "$LARGE_FILES"
          fi

      - name: Check for security vulnerabilities
        run: bun audit --audit-level=moderate
        continue-on-error: true

  complexity-analysis:
    name: Complexity Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check file count and structure
        run: |
          echo "### Code Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Source files (.ts/.tsx): $(find . -type f \( -name '*.ts' -o -name '*.tsx' \) -not -path '*/node_modules/*' -not -path '*/.next/*' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Total lines of code: $(find . -type f \( -name '*.ts' -o -name '*.tsx' \) -not -path '*/node_modules/*' -not -path '*/.next/*' -exec cat {} + | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Test files: $(find . -name '*.test.ts' -o -name '*.test.tsx' | wc -l)" >> $GITHUB_STEP_SUMMARY

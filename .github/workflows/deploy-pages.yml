# =============================================================
# YYC³ 企业智能管理系统 — GitHub Pages 部署工作流
# 部署域名: management.yyc3.vip (自定义域名 via CNAME)
# =============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间仅允许一个部署，跳过排队中的中间运行
concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUN_VERSION: "latest"
  NODE_VERSION: "22"

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Diagnostic — versions & native modules
        run: |
          echo "=== Versions ==="
          node --version
          bun --version
          echo "=== Sharp native binary check ==="
          node -e "try{require('sharp');console.log('sharp: OK')}catch(e){console.log('sharp:',e.message)}"
          echo "=== Platform ==="
          uname -m

      - name: Patch Next.js /_global-error 预渲染 Bug
        run: bash scripts/patch-next-prerender.sh

      - name: Prepare static export (移除后端 API / proxy)
        run: bash scripts/prepare-static-export.sh

      - name: Remove committed .env files (避免污染构建)
        run: rm -f .env .env.local .env.development .env.production

      - name: Run type check
        run: bun run type-check
        continue-on-error: true

      - name: Build static export
        run: |
          set +e
          cat > /tmp/build-debug.cjs << 'WRAPPER'
          // Intercept process.exit to get stack trace
          const origExit = process.exit.bind(process);
          process.exit = (code) => {
            if (code !== 0) {
              console.error('\n=== process.exit(' + code + ') intercepted ===');
              console.error(new Error().stack);
            }
            origExit(code);
          };
          process.on('uncaughtException', (e) => {
            console.error('\n=== UNCAUGHT EXCEPTION ===');
            console.error(e?.stack || e);
            origExit(97);
          });
          process.on('unhandledRejection', (e) => {
            console.error('\n=== UNHANDLED REJECTION ===');
            console.error(e?.stack || e);
          });
          // Run Next.js build in-process
          process.argv = ['node', 'next-build', '--webpack'];
          require('next/dist/cli/next-build');
          WRAPPER
          NODE_OPTIONS="--max-old-space-size=4096" node /tmp/build-debug.cjs 2>&1 | tee /tmp/build-output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Build failed (exit code $BUILD_EXIT)"
            echo "=== Full build output ==="
            cat /tmp/build-output.log
            exit 1
          fi
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_STATIC_EXPORT: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
          NEXT_PUBLIC_CUSTOM_DOMAIN: "true"
          NEXT_PUBLIC_SITE_URL: "https://management.yyc3.vip"
          NEXT_PUBLIC_APP_NAME: "YYC³ 企业智能管理系统"
          NEXT_PUBLIC_API_BASE_URL: "https://api.0379.love"
          JWT_SECRET: "ci-build-placeholder-secret-min-32-characters"
          SESSION_SECRET: "ci-build-placeholder-secret-min-32-characters"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-characters"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify CNAME exists in output
        run: |
          if [ ! -f "./out/CNAME" ]; then
            if [ -f "public/CNAME" ]; then
              echo "CNAME missing in output — copying from public/"
              cp public/CNAME ./out/CNAME
            else
              echo "WARNING: CNAME file not found. Deployment may fail."
              echo "management.yyc3.vip" > ./out/CNAME
            fi
          fi
          echo "CNAME content:"
          cat ./out/CNAME

      - name: Add .nojekyll to disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Inject 404 fallback for SPA routing
        run: cp ./out/index.html ./out/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check (optional)
        continue-on-error: true
        run: |
          sleep 15
          DEPLOY_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Deployed to: $DEPLOY_URL"
          curl -sfL "https://management.yyc3.vip" -o /dev/null -w "Custom Domain: HTTP %{http_code}\n" || \
            echo "Custom domain not yet propagated (DNS TTL)"
          curl -sfL "$DEPLOY_URL" -o /dev/null -w "Pages URL: HTTP %{http_code}\n" || \
            echo "Pages URL not yet reachable"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### GitHub Pages 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **域名**: https://management.yyc3.vip" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

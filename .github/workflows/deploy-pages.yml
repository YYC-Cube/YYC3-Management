# =============================================================
# YYC³ 企业智能管理系统 — GitHub Pages 部署工作流
# 部署域名: management.yyc3.vip (自定义域名 via CNAME)
# =============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间仅允许一个部署，跳过排队中的中间运行
concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.1.0'

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint
        continue-on-error: true

      - name: Run type check
        run: bun run type-check
        continue-on-error: true

      - name: Build static export
        run: |
          # 避免 bun run build 的 supply-chain 策略检查误报退出码
          node_modules/.bin/next build
        env:
          # 激活静态导出模式
          NEXT_STATIC_EXPORT: 'true'
          NEXT_PUBLIC_GITHUB_PAGES: 'true'
          # 使用自定义域名，无需 basePath
          NEXT_PUBLIC_CUSTOM_DOMAIN: 'true'
          NEXT_PUBLIC_SITE_URL: 'https://management.yyc3.vip'

      - name: Verify CNAME exists in output
        run: |
          if [ ! -f "./out/CNAME" ]; then
            echo "CNAME missing in output — copying from public/"
            cp public/CNAME ./out/CNAME
          fi
          echo "CNAME content:"
          cat ./out/CNAME

      - name: Add .nojekyll to disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check
        run: |
          sleep 15
          curl -sfL "https://management.yyc3.vip" -o /dev/null -w "HTTP Status: %{http_code}\n" || \
          curl -sfL "${{ steps.deployment.outputs.page_url }}" -o /dev/null -w "HTTP Status: %{http_code}\n"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### GitHub Pages Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain**: https://management.yyc3.vip" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

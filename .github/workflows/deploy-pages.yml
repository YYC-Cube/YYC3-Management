# =============================================================
# YYC³ 企业智能管理系统 — GitHub Pages 部署工作流
# 部署域名: management.yyc3.vip (自定义域名 via CNAME)
# =============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间仅允许一个部署，跳过排队中的中间运行
concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUN_VERSION: "1.2.2"

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch Next.js /_global-error 预渲染 Bug
        # Next.js 16.2.x 对 /_global-error 硬编码 appConfig: {} 导致 React SSR
        # 绑定为 null，使全部页面预渲染失败。详见 scripts/patch-next-prerender.sh
        run: bash scripts/patch-next-prerender.sh

      - name: Prepare static export (移除后端 API / proxy)
        # output: 'export' 不支持 API 路由与 middleware/proxy，Pages 本就不运行后端。
        # 仅在此导出构建中移除 app/api、middleware.ts、proxy.ts，不影响 Docker 源码。
        run: bash scripts/prepare-static-export.sh

      - name: Run type check
        run: bun run type-check
        continue-on-error: true

      - name: Build static export
        run: node_modules/.bin/next build
        env:
          # 必须显式设置：仓库内 .env 含 NODE_ENV=development 会污染构建，
          # 显式 production 可覆盖（Next.js 不以 .env 覆盖已存在的 process.env）
          NODE_ENV: production
          # 激活静态导出模式
          NEXT_STATIC_EXPORT: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
          # 使用自定义域名，无需 basePath
          NEXT_PUBLIC_CUSTOM_DOMAIN: "true"
          NEXT_PUBLIC_SITE_URL: "https://management.yyc3.vip"
          # 禁用 Next.js 遥测
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify CNAME exists in output
        run: |
          if [ ! -f "./out/CNAME" ]; then
            if [ -f "public/CNAME" ]; then
              echo "CNAME missing in output — copying from public/"
              cp public/CNAME ./out/CNAME
            else
              echo "WARNING: CNAME file not found. Deployment may fail."
              echo "management.yyc3.vip" > ./out/CNAME
            fi
          fi
          echo "CNAME content:"
          cat ./out/CNAME

      - name: Add .nojekyll to disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Inject 404 fallback for SPA routing
        run: cp ./out/index.html ./out/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check (optional)
        continue-on-error: true
        run: |
          sleep 15
          DEPLOY_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Deployed to: $DEPLOY_URL"
          curl -sfL "https://management.yyc3.vip" -o /dev/null -w "Custom Domain: HTTP %{http_code}\n" || \
            echo "Custom domain not yet propagated (DNS TTL)"
          curl -sfL "$DEPLOY_URL" -o /dev/null -w "Pages URL: HTTP %{http_code}\n" || \
            echo "Pages URL not yet reachable"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### GitHub Pages 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **域名**: https://management.yyc3.vip" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
